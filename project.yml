name: ZapZap
options:
  bundleIdPrefix: com.zapzap
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

packages:
  libwebp:
    url: https://github.com/SDWebImage/libwebp-Xcode
    from: 1.4.0

targets:
  ZapZap:
    type: application
    platform: iOS
    sources:
      - path: ZapZap
    settings:
      base:
        INFOPLIST_FILE: ZapZap/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zapzap.app
        PRODUCT_NAME: ZapZap
        TARGETED_DEVICE_FAMILY: "1"
        LSApplicationQueriesSchemes:
          - whatsapp
        NSCameraUsageDescription: "O ZapZap usa a câmera para você fotografar e criar figurinhas."
        NSPhotoLibraryUsageDescription: "O ZapZap acessa suas fotos para criar figurinhas personalizadas."
    dependencies:
      - package: libwebp
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false

  ZapZapTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ZapZapTests
    settings:
      base:
        INFOPLIST_FILE: ZapZapTests/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_TESTING_SEARCH_PATHS: YES
        SWIFT_TESTING_ENABLED: YES
      configs:
        Debug:
          BUNDLE_LOADER: $(TEST_HOST)
        Release:
          BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: ZapZap
